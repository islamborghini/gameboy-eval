<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>gameboy-eval — control panel</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; color:#000; background:#fff;
         font:14px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  a { color:#000; }
  header { border-bottom:2px solid #000; padding:14px 20px; }
  header h1 { margin:0; font-size:18px; }
  header .sub { color:#555; font-size:12px; }
  .layout { display:flex; min-height:calc(100vh - 53px); }
  nav { width:180px; border-right:2px solid #000; padding:12px 0; flex:none; }
  nav button { display:block; width:100%; text-align:left; border:0; background:none;
               padding:9px 20px; font:inherit; cursor:pointer; color:#000; }
  nav button:hover { background:#eee; }
  nav button.active { background:#000; color:#fff; }
  main { flex:1; padding:22px 26px; max-width:900px; }
  h2 { margin:0 0 14px; font-size:16px; }
  label { display:block; margin:12px 0 4px; font-size:12px; color:#333; }
  input, select { font:inherit; padding:6px 8px; border:1px solid #000; background:#fff;
                  min-width:280px; max-width:100%; }
  button.act { font:inherit; border:1px solid #000; background:#fff; color:#000;
               padding:7px 16px; cursor:pointer; margin-top:16px; }
  button.act:hover { background:#000; color:#fff; }
  button.act:disabled { opacity:.4; cursor:default; }
  .row { display:flex; gap:18px; flex-wrap:wrap; }
  .hint { color:#555; font-size:12px; margin:6px 0 0; }
  table { width:100%; border-collapse:collapse; margin-top:6px; }
  th, td { border:1px solid #000; padding:6px 9px; text-align:left; font-size:13px; }
  th { background:#000; color:#fff; font-weight:normal; }
  pre.joblog { background:#000; color:#fff; padding:12px; margin-top:14px; min-height:120px;
            max-height:380px; overflow:auto; white-space:pre-wrap; word-break:break-word;
            font-size:12.5px; }
  .badge { display:inline-block; border:1px solid #000; padding:1px 7px; font-size:12px; }
  .badge.running { background:#000; color:#fff; }
  .badge.failed  { background:#fff; color:#000; }
  .kv { margin:3px 0; } .kv b { display:inline-block; min-width:170px; }
  .ok::before  { content:"● "; } .no::before { content:"○ "; }
  .cmp { display:flex; gap:24px; flex-wrap:wrap; margin-top:18px; }
  .cmp figure { margin:0; }
  .cmp figcaption { font-size:12px; margin-bottom:6px; word-break:break-all; max-width:320px; }
  canvas.gb { width:320px; height:288px; image-rendering:pixelated; background:#000;
              border:1px solid #000; display:block; }
  .cmp .err { font-size:12px; margin-top:6px; max-width:320px; color:#333; }
</style>
</head>
<body>
<header>
  <h1>gameboy-eval — control panel</h1>
  <div class="sub">drive generate / grade / leaderboard from the browser · localhost only</div>
</header>
<div class="layout">
  <nav id="nav"></nav>
  <main id="main"></main>
</div>
<script src="app.js"></script>
</body>
</html>
